name: Build release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (for example v1.0.0)"
        required: true
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libegl1 libgl1 libxcb-cursor0
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Build native package
        shell: bash
        run: python build.py --exe-only "${{ inputs.version || github.ref_name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: AniBase-${{ runner.os }}
          path: releases/AniBase-*
          if-no-files-found: error
